<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BYU STEM Camp RC Car - Live Stream (BETA)</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="header-content">
            <img src="BYU-Logo.png" alt="BYU Logo" class="byu-logo">
            <div class="header-text">
                <h1>RC Car Live Stream</h1>
                <p>BYU STEM Camp 2026 • <span class="beta-badge">BETA</span></p>
            </div>
        </div>
    </header>

    <div class="container">
        <div id="errorMessage" class="error-message"></div>
        
        <div class="stream-section">
            <h2 class="stream-title">Live Video Feed</h2>
            
            <div class="stream-container">
                <canvas id="canvas"></canvas>
            </div>
            
            <div class="config-section">
                <div class="config-group">
                    <label for="ipInput">ESP32 IP Address:</label>
                    <input type="text" id="ipInput" placeholder="192.168.1.100" value="172.20.10.4">
                </div>
                <div class="config-group">
                    <label for="portInput">Stream Port:</label>
                    <input type="number" id="portInput" placeholder="81" value="81" min="1" max="65535">
                </div>
                <button onclick="connectStream()">Connect</button>
                <button class="disconnect-btn" onclick="disconnectStream()">Disconnect</button>
                <div class="status">
                    <div class="status-indicator disconnected" id="statusIndicator"></div>
                    <span id="statusText">Disconnected</span>
                </div>
            </div>
            
            <p class="info-text">Configuration saved automatically • Auto-reconnects on disconnect</p>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Brigham Young University STEM Camp • <a href="https://www.byu.edu">Visit BYU.edu</a> • This is a BETA test version</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
